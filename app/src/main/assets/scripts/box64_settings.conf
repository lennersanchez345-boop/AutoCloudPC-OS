# AutoCloudPC OS - Box64 Optimization Profile

# 1. Dynarec Settings (The engine speed)
BOX64_DYNAREC=1
BOX64_DYNAREC_CACHEPATH=/data/data/com.autocloudpc.os/files/cache/box64
BOX64_DYNAREC_SAVE_CACHE=1
BOX64_DYNAREC_LOAD_CACHE=1

# 2. Performance Presets
BOX64_DYNAREC_FASTROUND=1
BOX64_DYNAREC_FASTNAN=1
BOX64_DYNAREC_X87DOUBLE=0

# 3. Hardware Acceleration
# Enable ARMv8.2+ features if available
BOX64_DYNAREC_ALIGNED_ATOMICS=1
BOX64_DYNAREC_WAIT=0

# 4. Library Wrapping (Use Native Android/Linux libs)
BOX64_NOGLIBC=0
BOX64_LD_LIBRARY_PATH=/usr/lib/aarch64-linux-gnu:/lib/aarch64-linux-gnu
