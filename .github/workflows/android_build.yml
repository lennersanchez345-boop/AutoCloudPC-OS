name: Android CI - AutoCloudPC OS Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Permite ejecutar la compilación manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      # Nota: Como no tenemos el wrapper de gradle real aún, este paso fallaría si no lo creamos.
      # Crearemos un paso para inicializar el wrapper si no existe.

    - name: Setup Gradle Wrapper
      run: gradle wrapper

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AutoCloudPC-OS-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
