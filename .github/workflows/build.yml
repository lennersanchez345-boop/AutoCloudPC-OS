name: AutoCloudPC OS - Generador de APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Código
        uses: actions/checkout@v4

      - name: 2. Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. Diagnóstico y Compilación
        run: |
          echo "🔍 Buscando el archivo gradlew en el repositorio..."
          GRADLEW_PATH=$(find . -name gradlew | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "❌ ERROR: No se encontró el archivo gradlew en ningún lugar del repositorio."
            echo "Lista de archivos actuales:"
            ls -R
            exit 1
          fi
          
          echo "✅ Archivo localizado en: $GRADLEW_PATH"
          GRADLE_DIR=$(dirname "$GRADLEW_PATH")
          cd "$GRADLE_DIR"
          
          echo "🚀 Iniciando compilación desde $GRADLE_DIR..."
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 4. Guardar APK Final
        uses: actions/upload-artifact@v4
        with:
          name: AutoCloudPC-OS-APK
          path: "**/app-debug.apk"
